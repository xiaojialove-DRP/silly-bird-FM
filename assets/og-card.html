<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  @font-face { font-family: "Fraunces"; font-style: italic; font-weight: 600; src: url("./fonts/fraunces-latin-600-italic.woff2") format("woff2"); }
  @font-face { font-family: "Space Mono"; font-style: normal; font-weight: 700; src: url("./fonts/space-mono-latin-700-normal.woff2") format("woff2"); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #1f31cc;
    font-family: "Space Mono", "Songti SC", sans-serif;
    position: relative;
  }
  .frame {
    position: absolute; inset: 34px; border: 3px dotted rgba(248,244,234,.55); border-radius: 10px;
  }
  .stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 86px; }
  .bird { width: 340px; height: 340px; overflow: visible; }
  .silh2 { fill: #f8f4ea; }
  .cut { fill: #1f31cc; }
  .eye-p { fill: #1b2a9e; }
  .eye-g { fill: #f8f4ea; }
  .scallop, .lash { fill: none; stroke: #1b2a9e; stroke-width: 2.5; stroke-linecap: round; }
  .lash { stroke-width: 2; }
  .branch, .legs2, .chirp { fill: none; stroke: #f8f4ea; stroke-linecap: round; }
  .branch { stroke-width: 4; }
  .legs2 { stroke-width: 3.5; stroke-linejoin: round; }
  .chirp { stroke-width: 3; }
  .word { color: #f8f4ea; }
  .brand { font-family: "Fraunces", "Songti SC", serif; font-style: italic; font-weight: 600; font-size: 92px; line-height: 1; }
  .brand em { font-style: normal; font-family: "Space Mono", monospace; font-size: 34px; background: #f8f4ea; color: #1f31cc; padding: 2px 12px; border-radius: 6px; margin-left: 6px; vertical-align: 8px; }
  .tag { margin-top: 26px; font-size: 30px; letter-spacing: .5px; color: rgba(248,244,234,.82); font-family: "Songti SC", serif; }
  .star { position: absolute; color: rgba(248,244,234,.65); font-size: 26px; }
</style>
</head>
<body>
  <div class="frame"></div>
  <span class="star" style="left:120px; top:120px;">✦</span>
  <span class="star" style="right:150px; top:160px; font-size:18px;">✦</span>
  <span class="star" style="left:170px; bottom:150px; font-size:18px;">✦</span>
  <span class="star" style="right:110px; bottom:130px;">✦</span>
  <div class="stage">
    <svg class="bird" viewBox="0 0 200 200">
      <g>
        <path class="branch" d="M46 170 Q96 160 154 168 q10 1 12 -6" />
        <path class="legs2" d="M86 150 L83 168 M106 150 L109 168" />
        <path class="silh2" d="M64 106 L22 92 L38 110 L18 118 L40 126 L24 144 L66 130 Z" />
        <ellipse class="silh2" cx="94" cy="114" rx="44" ry="40" />
        <circle class="silh2" cx="126" cy="74" r="26" />
        <path class="silh2" d="M148 72 L170 77 L148 85 Z" />
        <path class="silh2" d="M116 52 L112 39 L122 50 Z M126 50 L127 36 L135 49 Z M137 52 L144 41 L145 54 Z" />
        <path class="cut" d="M90 106 C85 97 72 100 75 111 C77 121 90 130 90 130 C90 130 103 121 105 111 C108 100 95 97 90 106 Z" />
        <path class="scallop" d="M70 120 q9 7 18 1 M70 130 q9 7 18 1" />
        <path class="chirp" d="M174 71 Q181 78 174 85 M182 66 Q192 78 182 90" />
        <ellipse class="eye-p" cx="132" cy="70" rx="4.6" ry="5.6" />
        <circle class="eye-g" cx="133.6" cy="68" r="1.7" />
        <path class="lash" d="M136 65 q5 -2 7 0" />
      </g>
    </svg>
    <div class="word">
      <div class="brand">silly bird<em>FM</em></div>
      <div class="tag">一位朋友在为你广播 · 点开听听</div>
    </div>
  </div>
</body>
</html>
